name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI tasks with devcontainers/ci
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            task install
            task lint
            task test-ci
