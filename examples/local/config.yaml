version: 1

# Run from the repository root:
#   gantry build --config examples/local/config.yaml

overlays:
  # Base devcontainer config — loaded from this repository's examples/local directory.
  - repo: "./"
    subdirectory: "examples/local"
    files:
      - "base.json"

  # Team overlay — deep-merges extensions, settings, and postCreateCommand
  # using Jsonnet's +: operator so base values are preserved.
  - repo: "./"
    subdirectory: "examples/local"
    files:
      - "overlay.jsonnet"
